<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><script>window.HUB_LANG = "ar";</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Quiz Hub</title>
    <link rel="stylesheet" href="src/styles.css">
    <link rel="icon" href="src/app.png" type="image/png">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <div class="header-main">
            <div class="logo-area">
                <img src="src/app.png" alt="Icon" class="header-icon">
                <h1>My Quiz Hub</h1>
            </div>
            
            <div class="header-actions">
                <button id="searchToggle" class="icon-btn search-toggle" title="بحث">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>



                <button id="langToggle" class="lang-btn" title="Switch Language">
                    <span id="langLabel">English</span>
                </button>
            </div>
        </div>

        <!-- Search Bar — full-width row below header -->
        <div class="search-row" id="searchRow">
            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" placeholder="ابحث عن الاختبارات أو التصنيفات...">
                <button id="clearSearch" class="clear-btn">&times;</button>
            </div>
        </div>

        <nav class="tab-nav">
            <button class="tab-btn active" data-target="recent">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                الأخيرة
            </button>
            <button class="tab-btn" data-target="folders">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                المجلدات
            </button>
        </nav>
    </header>

    <main class="content-area">
        <!-- Loading State -->
        <div id="loadingState" class="state-container">
            <div class="spinner"></div>
            <p>جاري تحميل الفهرس...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="state-container hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <p>تعذر تحميل الفهرس. تأكد من وجود ملف catalog.json.</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="state-container hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <p id="emptyMessage">لم يتم العثور على اختبارات بعد.</p>
        </div>

        <!-- Recent Tab View -->
        <div id="recentView" class="view-panel active">
            <div class="list-container" id="recentList">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Folders Tab View -->
        <div id="foldersView" class="view-panel">
            <div class="breadcrumb-area">
                <button id="folderBackBtn" class="back-nav-btn" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="breadcrumb" id="breadcrumb">
                    <button class="crumb-btn root-crumb" data-path="">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="margin-bottom: -2px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                        الرئيسية
                    </button>
                </div>
            </div>
            
            <div class="list-container bars-layout" id="folderList">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <!-- About Overlay -->
    <div id="aboutOverlay" class="overlay hidden">
        <div class="overlay-backdrop"></div>
        <div class="overlay-card about-card">
            <button class="overlay-close" id="aboutClose">&times;</button>
            <div class="profile-img">
                <img src="src/app.png" alt="Author">
            </div>
            <h2 style="display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.1rem;">
                <span id="authorName" style="font-weight: 700; color: var(--text-primary);">عباس عبد الرزاق</span>
                <span style="font-weight: 500; color: var(--text-secondary);">|</span>
                <span id="authorBadge" style="font-weight: 700; color: var(--text-primary);">مالك</span>
            </h2>
            <div class="about-social" style="margin-top: 15px; text-align: center;">
                <a href="https://t.me/Abb1s0" target="_blank" class="social-btn" title="Telegram">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"></path><path d="M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <!-- 404 Overlay -->
    <div id="notFoundOverlay" class="overlay hidden">
        <div class="overlay-backdrop"></div>
        <div class="overlay-card notfound-card">
            <div class="error-code">404</div>
            <div class="error-title" id="nfTitle">الهدف مفقود</div>
            <p class="error-msg" id="nfMsg">تمت إزالة صفحة الاختبار التي تبحث عنها أو نقلها بواسطة المؤلف. لا تقلق، تقدمك في الفئات الأخرى آمن.</p>
            <button class="accent-btn" id="nfHomeBtn" onclick="document.getElementById('notFoundOverlay').classList.add('hidden'); history.replaceState(null, '', location.pathname);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span id="nfHomeTxt">العودة للمنصة</span>
            </button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="footer-content">
            <span class="app-name">اختبار</span>
            <span class="app-version">v1.0.2</span>
            <span class="separator">|</span>
            <span class="credits"><a href="javascript:void(0)" class="about-link" id="aboutLink">المؤلف</a></span>
        </div>
    </footer>

    <script src="src/catalog.js"></script>
    <script src="src/history.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
